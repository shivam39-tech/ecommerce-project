{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">🔥 Latest Products</h3>

<div class="row">
    {% for p in products %}
    <div class="col-md-4">
        <div class="card product-card shadow-sm mb-4">

            {% if p.image %}
            <img src="{{ p.image.url }}" class="card-img-top product-img">
            {% endif %}

            <div class="card-body text-center">
                <h5 class="card-title">{{ p.name }}</h5>

                <h4 class="text-success">₹{{ p.price }}</h4>

                <p class="text-muted small">{{ p.description|truncatechars:60 }}</p>

                <a href="/add/{{ p.id }}/" class="btn btn-primary w-100">
                    Add to Cart
                </a>
            </div>

        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
