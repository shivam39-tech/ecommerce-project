{% extends 'base.html' %}
{% block content %}

<h3>My Orders 📦</h3>

{% for order in orders %}
<div class="card p-3 mb-3">

    <h5>Order ID: {{order.id}}</h5>
    <p>City: {{order.city}}</p>
    <p>Payment: {{order.payment_method}}</p>

    <hr>

    {% for item in order.orderitem_set.all %}
        <p>
            {{item.product.name}} (Qty: {{item.quantity}})
        </p>
    {% endfor %}

</div>
{% endfor %}

{% endblock %}
