{% extends 'base.html' %}
{% block content %}

<h3>Your Cart 🛒</h3>

<table class="table table-bordered bg-white shadow-sm">
<tr>
<th>Product</th>
<th>Quantity</th>
</tr>

{% for i in items %}
<tr>
<td>{{i.product.name}}</td>
<td>{{i.quantity}}</td>

<td>
<a href="/remove/{{i.id}}/" class="btn btn-danger btn-sm">
Remove
</a>
</td>
<td>
<a href="/decrease/{{i.id}}/" class="btn btn-warning btn-sm">-</a>
{{i.quantity}}
<a href="/increase/{{i.id}}/" class="btn btn-success btn-sm">+</a>
</td>
</tr>
{% endfor %}
</table>

<a href="/checkout/" class="btn btn-success">
    Proceed to Checkout
</a>

{% endblock %}
